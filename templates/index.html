<!DOCTYPE html>
<html>

<head>
    <title>AST Based GPL Compliance Detector</title>

    <style>
        body{
            font-family: Arial;
            background-color:#f2f2f2;
            text-align:center;
            padding:40px;
        }

        .container{
            background:white;
            width:500px;
            margin:auto;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px;
        }

        button{
            padding:10px 20px;
            background-color:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background-color:#0056b3;
        }

        .result{
            margin-top:20px;
            padding:15px;
            background:#e8f5e9;
            border-radius:5px;
        }
    </style>

</head>

<body>

<div class="container">

<h2>AST Based GPL Compliance Detector</h2>

<form method="POST">

<label>Repository 1 URL</label><br>
<input type="text" name="repo1" placeholder="Enter GitHub Repository URL" required>

<br>

<label>Repository 2 URL</label><br>
<input type="text" name="repo2" placeholder="Enter GitHub Repository URL" required>

<br>

<button type="submit">Check Similarity</button>

</form>

{% if result %}

<div class="result">
<h3>Result</h3>
<p>{{result}}</p>
</div>

{% endif %}

</div>

</body>
</html>
